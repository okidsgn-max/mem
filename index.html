
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Графическая новелла</title>
    <style>
        body { margin: 0; font-family: sans-serif; background: #000; color: white; text-align: center; }
        #game-container { width: 600px; height: 800px; margin: 0 auto; position: relative; background: #111; }
        #scene-image { width: 100%; height: 70%; object-fit: cover; }
        #question { margin-top: 10px; font-size: 20px; }
        .answer-btn { display: block; margin: 10px auto; padding: 10px 20px; background: #333; color: white; border: none; cursor: pointer; width: 80%; }
        .answer-btn:hover { background: #555; }
        #score { position: absolute; top: 10px; left: 10px; background: #222; padding: 5px 10px; border-radius: 5px; }
        #memory-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; padding: 10px; }
        .memory-card { width: 100%; aspect-ratio: 1/1; background-size: cover; cursor: pointer; border: 2px solid #444; }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="score">Очки: 0</div>
        <img id="scene-image" src="assets/start.jpg" alt="scene">
        <div id="question">Привет! Я твой друг. Нет.</div>
        <div id="answers"></div>
    </div>

<script>
const scenes = {
    start: {
        image: "assets/start.jpg",
        question: "Что включить в кафе?",
        answers: [
            { text: "Спеть", next: "empty" },
            { text: "Включить свой плеер", next: "agent" },
            { text: "Включить Звук Бизнес", next: "success", score: 1 }
        ]
    },
    empty: {
        image: "assets/emptycafe.jpg",
        question: "Пусто, все ушли...",
        answers: [{ text: "Дальше", next: "cake" }]
    },
    agent: {
        image: "assets/agent.jpg",
        question: "Подозрительный агент пришёл.",
        answers: [{ text: "Продолжить", next: "cake" }]
    },
    success: {
        image: "assets/success.jpg",
        question: "Все довольны, музыка отличная!",
        answers: [{ text: "Продолжить", next: "cake" }]
    },
    cake: {
        image: "assets/konditer.jpg",
        question: "Кондитер оформляет торт. Что выбрать?",
        answers: [
            { text: "Нарисовать Лосяша", next: "sud" },
            { text: "Придумать свою картинку", next: "game", score: 1 }
        ]
    },
    sud: {
        image: "assets/sud.jpg",
        question: "Пришло уведомление в суд!",
        answers: [{ text: "Продолжить", next: "game" }]
    },
    game: {
        image: "assets/game3x3.jpg",
        question: "Найди одинаковые обложки!",
        isMemoryGame: true
    },
    tv: {
        image: "assets/tv.jpg",
        question: "Включить любимый сериал?",
        answers: [
            { text: "Да, всё нормально", next: "court" },
            { text: "У меня лицензия", next: "final", score: 1 }
        ]
    },
    court: {
        image: "assets/sud.jpg",
        question: "Уведомление в суд...",
        answers: [{ text: "Финал", next: "final" }]
    },
    final: {
        image: "assets/final.jpg",
        question: "Финал зависит от очков.",
        answers: []
    }
};

let score = 0;
let firstCard = null;
let lockBoard = false;
let matches = 0;

function setScene(name) {
    const scene = scenes[name];
    document.getElementById("scene-image").src = scene.image;
    document.getElementById("question").textContent = scene.question;
    document.getElementById("answers").innerHTML = "";

    if (scene.isMemoryGame) return renderMemoryGame();

    scene.answers.forEach(a => {
        const btn = document.createElement("button");
        btn.className = "answer-btn";
        btn.textContent = a.text;
        btn.onclick = () => {
            if (a.score) score += a.score;
            document.getElementById("score").textContent = "Очки: " + score;
            if (a.next) setScene(a.next);
        };
        document.getElementById("answers").appendChild(btn);
    });
}

function renderMemoryGame() {
    const grid = document.createElement("div");
    grid.id = "memory-grid";
    const images = ["vinyl1.jpg","vinyl2.jpg","vinyl3.jpg","vinyl4.jpg","vinyl5.jpg","vinyl6.jpg"];
    const all = [...images.slice(0,4),...images.slice(0,4)].sort(() => 0.5 - Math.random());
    all.forEach(src => {
        const card = document.createElement("div");
        card.className = "memory-card";
        card.dataset.img = src;
        card.style.backgroundImage = "url('assets/back.jpg')";
        card.onclick = () => flipCard(card, src);
        grid.appendChild(card);
    });
    const answers = document.getElementById("answers");
    answers.innerHTML = "";
    answers.appendChild(grid);
}

function flipCard(card, src) {
    if (lockBoard || card.classList.contains("matched")) return;
    card.style.backgroundImage = `url('assets/${src}')`;
    if (!firstCard) {
        firstCard = card;
    } else {
        lockBoard = true;
        setTimeout(() => {
            if (firstCard.dataset.img === card.dataset.img && firstCard !== card) {
                firstCard.classList.add("matched");
                card.classList.add("matched");
                matches++;
                if (matches === 4) setScene("tv");
            } else {
                firstCard.style.backgroundImage = "url('assets/back.jpg')";
                card.style.backgroundImage = "url('assets/back.jpg')";
            }
            firstCard = null;
            lockBoard = false;
        }, 1000);
    }
}

setScene("start");
</script>
</body>
</html>
